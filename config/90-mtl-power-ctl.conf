# TLP custom config for Intel Meteor Lake laptops
# Managed by power-ctl — do not edit manually.
# See: https://github.com/oaklight/meteorlake-power-ctl

TLP_ENABLE=1
TLP_AUTO_SWITCH=1
TLP_DEFAULT_MODE=BAT

# --- CPU governor ---
# Always powersave: HWP/EPP drives actual frequency
CPU_SCALING_GOVERNOR_ON_AC=powersave
CPU_SCALING_GOVERNOR_ON_BAT=powersave
CPU_SCALING_GOVERNOR_ON_SAV=powersave

# --- EPP (Energy Performance Preference) ---
CPU_ENERGY_PERF_POLICY_ON_AC=balance_performance
CPU_ENERGY_PERF_POLICY_ON_BAT=balance_power
CPU_ENERGY_PERF_POLICY_ON_SAV=power

# --- P-state caps ---
# Uncapped on all profiles — turbo ON/OFF is the frequency control knob
CPU_MIN_PERF_ON_AC=0
CPU_MAX_PERF_ON_AC=100
CPU_MIN_PERF_ON_BAT=0
CPU_MAX_PERF_ON_BAT=100
CPU_MIN_PERF_ON_SAV=0
CPU_MAX_PERF_ON_SAV=100

# --- Turbo boost ---
CPU_BOOST_ON_AC=1
CPU_BOOST_ON_BAT=0
CPU_BOOST_ON_SAV=0

# --- HWP dynamic boost ---
CPU_HWP_DYN_BOOST_ON_AC=1
CPU_HWP_DYN_BOOST_ON_BAT=0
CPU_HWP_DYN_BOOST_ON_SAV=0

# --- Platform profile ---
PLATFORM_PROFILE_ON_AC=balanced
PLATFORM_PROFILE_ON_BAT=balanced
PLATFORM_PROFILE_ON_SAV=low-power

# --- Intel GPU ---
INTEL_GPU_POWER_PROFILE_ON_AC=base
INTEL_GPU_POWER_PROFILE_ON_BAT=power_saving
INTEL_GPU_POWER_PROFILE_ON_SAV=power_saving

# --- Disk ---
DISK_APM_LEVEL_ON_BAT="128"
DISK_IOSCHED="mq-deadline"
SATA_LINKPWR_ON_BAT="min_power"
AHCI_RUNTIME_PM_ON_BAT=auto

# --- Wireless ---
WIFI_PWR_ON_AC=off
WIFI_PWR_ON_BAT=on

# --- Audio ---
SOUND_POWER_SAVE_ON_BAT=1
SOUND_POWER_SAVE_CONTROLLER=Y

# --- USB / Runtime PM / PCIe ---
USB_AUTOSUSPEND=1
RUNTIME_PM_ON_BAT=auto
PCIE_ASPM_ON_BAT=powersupersave

# --- USB denylist ---
# Add fingerprint reader or other problematic USB devices here
# USB_DENYLIST="06cb:0123"
